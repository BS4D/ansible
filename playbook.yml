---
- name: provision infrastructure
  hosts: all
  pre_tasks:
    - name: merge common vars with host-specific ones
      loop: "{{ (common_vars | merge_dicts(host_vars) if host_vars is defined else common_vars) | dict2items }}"
      set_fact:
        "{{ item.key }}": "{{ item.value }}"
      tags: always

    - name: update the package manager cache
      become: true
      package:
        update_cache: true
      changed_when: false
      tags:
        - network
        - packages
  roles:
    - role: network
      tags: network

    - role: packages
      tags: packages

    - role: file-sync
      tags: file-sync

    - role: git-repos
      tags: git-repos

    - role: config
      tags: config

    - role: services
      tags: services
