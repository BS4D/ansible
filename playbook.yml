---
- name: provision infrastructure
  hosts: all
  pre_tasks:
    - name: merge common vars with host-specific ones
      loop: "{{ (common_vars | merge_dicts(host_vars) if host_vars is defined else common_vars) | dict2items }}"
      set_fact:
        "{{ item.key }}": "{{ item.value }}"
      tags: always
  roles:
    - role: network
      tags: network

    - role: packages
      tags: packages

    - role: file-sync
      tags: file-sync

    - role: git-repos
      tags: git-repos

    - role: config
      tags: config

    - role: services
      tags: services
