---
# system
- name: (server) configure the tailscale repository
  when: server
  become: true
  deb822_repository:
    name: tailscale
    state: present
    types: [deb]
    uris: "{{ tailscale_deb_url }}"
    suites: ["{{ debian_release_name }}"]
    components: [main]
    signed_by: "{{ tailscale_deb_url }}/{{ debian_release_name }}.noarmor.gpg"
    install_python_debian: true
  register: tailscale_repo
- name: (server) update apt cache to pull tailscale
  when: tailscale_repo.changed
  apt:
    update_cache: true
- name: (server) run system update
  when: server
  become: true
  apt:
    upgrade: dist
- name: (desktop) run system update
  when: desktop
  become: true
  pacman:
    upgrade: true
- name: install target system packages
  become: true
  package:
    state: present
    name: "{{ package_list.system.values() | list | flatten }}"

- name: (server) skip flatpak and aur packages
  when: server
  meta: end_role

# flatpak
- name: delete the system flathub remote
  become: true
  flatpak_remote:
    state: absent
    name: flathub
- name: set up the user flathub remote
  flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    method: user
- name: install/update flatpak apps
  flatpak:
    method: user
    state: latest
    name: "{{ package_list.flatpak }}"

# aur
- name: set makepkg config to use doas for privilege escalation
  lineinfile:
    create: true
    path: "{{ ansible_facts.env.HOME }}/.makepkg.conf"
    regex: ^PACMAN_AUTH=.*$
    line: "PACMAN_AUTH=('doas')"
- name: gather aur package facts
  package_facts:
- name: install/update aur packages
  loop: "{{ package_list.aur }}"
  include_tasks: aur-pkg.yml
  vars:
    package_name: "{{ item }}"
