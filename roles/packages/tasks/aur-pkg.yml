---
- name: clone the {{ package_name }} aur repository
  git:
    repo: "https://aur.archlinux.org/{{ package_name }}.git"
    dest: "{{ ansible_facts.env.HOME }}/git/aur/{{ package_name }}"
  register: aur_repo

- name: install/update {{ package_name }}
  when: aur_repo.changed
  command:
    chdir: "{{ ansible_facts.env.HOME }}/git/aur/{{ package_name }}"
    cmd: makepkg --syncdeps --install --noconfirm
  register: aur_pull

- import_tasks: log-pkg.yml
  vars:
    process: "aur package pull - {{ package_name }}:"
    task_result: "{{ aur_pull }}"
