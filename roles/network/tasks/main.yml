---
- name: Check internet access
  when: desktop
  ansible.builtin.command: ping -c 1 1.1.1.1
  register: network_ping
  changed_when: false
  ignore_errors: true

- name: Set up the wifi connection
  when:
    - desktop
    - network_ping.failed
  ansible.builtin.import_tasks: wifi.yml

- name: Ensure required network packages are installed
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ package_list.system.network }}"

- name: Check if firewall is enabled
  become: true
  ansible.builtin.command: ufw status
  register: network_firewall
  changed_when: false

- name: Set up the firewall
  when: "'Status: inactive' in network_firewall.stdout"
  ansible.builtin.import_tasks: firewall.yml

- name: Create the user ssh key
  when: desktop
  ansible.builtin.user:
    name: "{{ ansible_facts.env.USER }}"
    generate_ssh_key: true
    ssh_key_type: ed25519

- name: Create the home server host entry
  when:
    - desktop
    - "'ip' in home_server"
  become: true
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ^.*\s{{ home_server.hostname }}$
    line: "{{ home_server.ip }} {{ home_server.hostname }}"

- name: Add the pc user public ssh key to authorized keys
  when: server
  ansible.posix.authorized_key:
    user: "{{ ansible_facts.env.USER }}"
    key: "{{ lookup('file', lookup ('env', 'HOME') ~ '/.ssh/id_ed25519.pub') }}"

- name: Automatically accept new host keys in ssh connections
  ansible.builtin.lineinfile:
    create: true
    path: "{{ ansible_facts.env.HOME }}/.ssh/config"
    mode: '0644'
    regexp: ^StrictHostKeyChecking
    line: StrictHostKeyChecking=accept-new
